name: Generate Snake

on:
  # Her gece yarısı otomatik çalıştır
  schedule:
    - cron: "0 0 * * *" 
  
  # İstediğin zaman elle de çalıştırabilmen için
  workflow_dispatch:

  # Ana branch'e her push yapıldığında çalıştır
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # GitHub kullanıcı adın otomatik alınır
          github_user_name: ${{ github.repository_owner }}
          
          # Çıktı dosyaları (Hem açık hem koyu tema için)
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
